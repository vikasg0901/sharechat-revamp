function mkR(d,i){var c=document.createElement('div');c.className='reel-card'+(i===0?' active':'');c.dataset.index=i;c.innerHTML='<div class="reel-container"><div class="reel-loader"><div class="spinner"></div></div><video playsinline webkit-playsinline loop muted preload="'+(i<2?'auto':'none')+'"><source src="'+d.v+'" type="video/mp4"></video><div class="reel-play-overlay"><div class="play-btn"></div></div><div class="live-comments"></div><div class="reel-overlay-info"><div class="creator-row"><div class="ov-avatar">'+d.cr.av+'</div><span class="ov-name">'+d.cr.n+'</span><span class="ov-follow" onclick="this.textContent=this.textContent===\'Follow\'?\'Following\':\'Follow\';this.classList.toggle(\'following\')">Follow</span></div><div class="ov-desc">'+d.d+'</div><div class="ov-tags">'+d.tg.map(function(t){return'<span>'+t+'</span>'}).join(' ')+'</div><div class="ov-music"><span class="music-icon">♪</span> '+d.mu+'</div></div><div class="reel-progress"><div class="reel-progress-fill"></div></div><div class="reel-actions"><div class="act lk-a" data-l="0"><div class="act-icon">🤍</div><div class="act-count">'+d.lk+'</div></div><div class="act cm-a"><div class="act-icon">💬</div><div class="act-count">'+d.cm+'</div></div><div class="act sh-a"><div class="act-icon">📤</div><div class="act-count">'+d.sh+'</div></div><div class="act sv-a" data-s="0"><div class="act-icon">🔖</div><div class="act-count">'+d.sv+'</div></div><div class="act mr-a"><div class="act-icon">⋯</div></div></div></div><div class="reel-bottom"><div class="reel-desc">'+d.d+'</div><div class="reel-tags-row">'+d.tg.map(function(t){return'<span>'+t+'</span>'}).join('')+'</div></div>';var vid=c.querySelector('video'),pf=c.querySelector('.reel-progress-fill'),ov=c.querySelector('.reel-play-overlay');vid.addEventListener('canplay',function(){c.classList.add('loaded')},{once:true});vid.addEventListener('loadeddata',function(){c.classList.add('loaded')},{once:true});vid.addEventListener('timeupdate',function(){if(vid.duration)pf.style.width=(vid.currentTime/vid.duration*100)+'%';});ov.addEventListener('click',function(){var n=Date.now();if(n-lastT<300){doLk(c);lastT=0;return;}lastT=n;setTimeout(function(){if(Date.now()-lastT>=290){if(vid.paused){vid.play();c.classList.remove('paused')}else{vid.pause();c.classList.add('paused')}}},300);});c.querySelector('.lk-a').onclick=function(){var a=c.querySelector('.lk-a'),l=a.dataset.l==='1';a.dataset.l=l?'0':'1';a.classList.toggle('liked');a.classList.add('anim');setTimeout(function(){a.classList.remove('anim')},400);a.querySelector('.act-icon').textContent=l?'🤍':'❤️';if(!l)doLk(c);};c.querySelector('.cm-a').onclick=function(){openCmt(d)};c.querySelector('.sh-a').onclick=function(){c.querySelector('.sh-a').classList.add('anim');setTimeout(function(){c.querySelector('.sh-a').classList.remove('anim')},400);openShr(d);};c.querySelector('.sv-a').onclick=function(){var a=c.querySelector('.sv-a'),s=a.dataset.s==='1';a.dataset.s=s?'0':'1';a.classList.add('anim');setTimeout(function(){a.classList.remove('anim')},400);a.querySelector('.act-icon').textContent=s?'🔖':'📑';toast(s?'Removed from saved':'Saved to collection');};c.querySelector('.mr-a').onclick=function(){toast('More options coming soon')};return c;}
function doLk(c){var b=document.createElement('div');b.className='heart-burst';b.innerHTML='<span>❤️</span>';c.querySelector('.reel-container').appendChild(b);setTimeout(function(){b.remove()},1000);var a=c.querySelector('.lk-a');if(a.dataset.l!=='1'){a.dataset.l='1';a.classList.add('liked');a.querySelector('.act-icon').textContent='❤️';}}
function startLC(c){var el=c.querySelector('.live-comments');function add(){var d=LIVE[Math.floor(Math.random()*LIVE.length)];var e=document.createElement('div');e.className='live-comment';e.innerHTML='<span class="lc-name">'+d.n+'</span> '+d.t;el.appendChild(e);setTimeout(function(){e.remove()},4500);if(el.children.length>3)el.firstChild.remove();}var id=setInterval(add,2500+Math.random()*2000);setTimeout(add,600);lcT.push(id);}
function stopLC(){lcT.forEach(clearInterval);lcT=[];}
function openCmt(d){document.getElementById('cmtC').textContent=d.cm+' Comments';var l=document.getElementById('cmtL');l.innerHTML=CMTS.slice().sort(function(){return Math.random()-0.5}).map(function(c){return'<div class="cmt"><div class="cmt-av">'+c.av+'</div><div class="cmt-body"><div class="cmt-name">'+c.n+'</div><div class="cmt-text">'+c.t+'</div><div class="cmt-meta"><span>'+c.tm+' ago</span><span onclick="this.textContent=this.textContent.charAt(0)===\'❤\'?\'🤍 '+c.lk+'\':\'❤️ '+(c.lk+1)+'\'">🤍 '+c.lk+'</span><span>Reply</span></div></div></div>'}).join('');document.getElementById('cmtP').classList.add('open');}
document.getElementById('cmtX').onclick=function(){document.getElementById('cmtP').classList.remove('open')};document.getElementById('cmtP').onclick=function(e){if(e.target.id==='cmtP')e.target.classList.remove('open')};
document.getElementById('cmtS').onclick=function(){var i=document.getElementById('cmtI');if(!i.value.trim())return;document.getElementById('cmtL').insertAdjacentHTML('afterbegin','<div class="cmt"><div class="cmt-av">😎</div><div class="cmt-body"><div class="cmt-name" style="color:#FF6B35">You</div><div class="cmt-text">'+i.value+'</div><div class="cmt-meta"><span>Just now</span><span>🤍 0</span></div></div></div>');i.value='';toast('Comment posted!');};
function openShr(d){document.getElementById('shrU').value='https://sharechat.com/v/'+d.cr.n.replace(/[^a-zA-Z]/g,'').substring(0,10);document.getElementById('shrP').classList.add('open');}
document.getElementById('shrX').onclick=function(){document.getElementById('shrP').classList.remove('open')};document.getElementById('shrP').onclick=function(e){if(e.target.id==='shrP')e.target.classList.remove('open')};
document.getElementById('sWa').onclick=function(){window.open('https://wa.me/?text='+encodeURIComponent('Check out this video on ShareChat! 🔥\n'+document.getElementById('shrU').value),'_blank');document.getElementById('shrP').classList.remove('open');};
document.getElementById('sTg').onclick=function(){window.open('https://t.me/share/url?url='+encodeURIComponent(document.getElementById('shrU').value),'_blank');document.getElementById('shrP').classList.remove('open');};
document.getElementById('sTw').onclick=function(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent('🔥 '+document.getElementById('shrU').value),'_blank');document.getElementById('shrP').classList.remove('open');};
['sIg','sCp','sMr'].forEach(function(id){document.getElementById(id).onclick=function(){navigator.clipboard.writeText(document.getElementById('shrU').value);toast('Link copied!');document.getElementById('shrP').classList.remove('open');};});
document.getElementById('shrUC').onclick=function(){navigator.clipboard.writeText(document.getElementById('shrU').value);toast('Copied!');};
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000);}
REELS.forEach(function(d,i){feed.appendChild(mkR(d,i))});
var obs=new IntersectionObserver(function(es){es.forEach(function(e){var c=e.target,v=c.querySelector('video'),idx=+c.dataset.index;if(e.isIntersecting&&e.intersectionRatio>0.6){c.classList.add('active');cur=idx;[0,1,2].forEach(function(o){var r=feed.children[idx+o];if(r){var vv=r.querySelector('video');if(vv&&vv.preload==='none')vv.preload='auto';}});v.play().catch(function(){});c.classList.remove('paused');stopLC();startLC(c);}else{c.classList.remove('active');v.pause();v.currentTime=0;}});},{threshold:[0.6]});
document.querySelectorAll('.reel-card').forEach(function(r){obs.observe(r)});
document.getElementById('navUp').onclick=function(){if(cur>0)feed.children[cur-1].scrollIntoView({behavior:'smooth'})};
document.getElementById('navDown').onclick=function(){if(cur<REELS.length-1)feed.children[cur+1].scrollIntoView({behavior:'smooth'})};
document.addEventListener('keydown',function(e){if(e.key==='ArrowDown'&&cur<REELS.length-1){e.preventDefault();feed.children[cur+1].scrollIntoView({behavior:'smooth'});}if(e.key==='ArrowUp'&&cur>0){e.preventDefault();feed.children[cur-1].scrollIntoView({behavior:'smooth'});}});
document.addEventListener('click',function(){var v=document.querySelector('.reel-card.active video');if(v&&v.paused)v.play().catch(function(){});},{once:true});
document.addEventListener('touchstart',function(){var v=document.querySelector('.reel-card video');if(v)v.play().catch(function(){});},{once:true});
setInterval(function(){document.querySelectorAll('.reel-card').forEach(function(r,i){var v=r.querySelector('video');if(Math.abs(i-cur)>1&&!v.paused)v.pause();});},1000);
</script>
</body>
</html>
